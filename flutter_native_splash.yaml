# Comando para gerar as imagens com o puglin
# fvm dart run flutter_native_splash:create
flutter_native_splash:
  android: true
  ios: true
  android_gravity: center

  # Light mode
  color: "#1B2F4E"
  image: assets/images/logo/torpheus_logo.png

  # Dark mode
  color_dark: "#1B2F4E"
  image_dark: assets/images/logo/torpheus_logo.png

  android_12:
    # Light mode
    image: assets/images/logo/torpheus_logo.png
    icon_background_color: "#1B2F4E"

    # Dark mode
    image_dark: assets/images/logo/torpheus_logo.png
    icon_background_color_dark: "#1B2F4E"
